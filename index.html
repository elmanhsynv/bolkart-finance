<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Kredit Kartı Professional İdarəetmə</title>
    
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="shortcut icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .expense-card:hover { transform: scale(1.01); transition: 0.2s; }
        .hidden-element { display: none; }
        .progress-bar { transition: width 0.5s ease-in-out; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        select option { background-color: #1f2937; color: white; }
        
        /* Zoom-u tamamilə kəsmək üçün daxiletmə sahələrini 16px edirik */
        input, select, textarea {
            font-size: 16px !important;
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans p-5">

    <div class="max-w-md mx-auto">
        <div class="bg-gradient-to-br from-indigo-900 via-purple-800 to-slate-900 p-6 rounded-3xl shadow-2xl mb-6 relative overflow-hidden border border-white/10 text-center">
            <div class="absolute -right-5 -bottom-5 w-24 h-24 bg-purple-500 opacity-10 rounded-full blur-xl"></div>
            
            <div class="mb-6 text-center">
                <h1 class="text-[10px] opacity-60 uppercase tracking-[0.3em] mb-1 text-purple-200">Real Şəxsi Balans</h1>
                <div class="text-5xl font-black tracking-tight" id="realBalanceDisplay">₼ 12500.00</div>
                <p class="text-[10px] mt-2 text-gray-400 italic font-light">Bütün öhdəliklər çıxıldıqdan sonra qalan məbləğ</p>
            </div>
            
            <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/10">
                <div class="text-left">
                    <p class="text-[9px] opacity-50 uppercase font-bold text-center">Mövcud Limit</p>
                    <p class="font-bold text-green-400 text-md text-center" id="remainingDisplay">₼ 12500.00</p>
                </div>
                <div class="text-right border-l border-white/5 pl-4">
                    <p class="text-[9px] opacity-50 uppercase font-bold text-center">Ümumi Borc Yükü</p>
                    <p class="font-bold text-red-400 text-md text-center" id="totalDebtLoad">₼ 0.00</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-gray-800 p-3 rounded-2xl border border-gray-700 shadow-md">
                <label class="text-[9px] text-gray-500 uppercase block mb-1">Maaş Günü</label>
                <input type="number" id="salaryDay" min="1" max="31" value="1" onchange="saveSalaryDay()" class="bg-transparent border-none text-indigo-400 font-bold outline-none text-xl w-full">
            </div>
            <div class="bg-gray-800 p-3 rounded-2xl border border-gray-700 shadow-md flex items-center">
                <div class="text-right w-full">
                    <p class="text-[9px] text-gray-500 uppercase block">Gələn ay ödəniş</p>
                    <p id="nextMonthDisplay" class="font-bold text-orange-400 text-lg">₼ 0.00</p>
                </div>
            </div>
        </div>

        <div id="paymentCalendar" class="bg-gray-800 p-5 rounded-2xl mb-6 border border-orange-500/20 hidden-element shadow-lg text-left">
            <h2 class="text-[10px] font-bold mb-3 text-orange-400 uppercase tracking-widest flex items-center">
                <span class="mr-2">📅</span> Taksit Ödəniş Cədvəli
            </h2>
            <div id="calendarList" class="space-y-2 max-h-40 overflow-y-auto pr-2 text-[11px]"></div>
        </div>

        <div class="bg-gray-800 p-5 rounded-2xl mb-6 border border-gray-700 shadow-xl border-t-2 border-indigo-500 text-left">
            <h2 class="text-sm font-bold mb-4 text-indigo-300 uppercase tracking-wider">Yeni Əməliyyat Əlavə Et</h2>
            <div class="space-y-3">
                <input type="text" id="itemName" placeholder="Məhsul/Xidmət" class="w-full p-3 rounded-xl bg-gray-700/50 border border-gray-600 focus:border-indigo-500 outline-none transition text-white">
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="itemAmount" placeholder="Məbləğ" class="w-full p-3 rounded-xl bg-gray-700/50 border border-gray-600 focus:border-indigo-500 outline-none text-white">
                    <select id="itemCategory" class="w-full p-3 rounded-xl bg-gray-700/50 border border-gray-600 outline-none text-white font-medium focus:border-indigo-500">
                        <option value="" disabled selected>Kateqoriya</option>
                        <option value="Geyim alış-verişi">Geyim</option>
                        <option value="Elektronika">Elektronika</option>
                        <option value="Mebel">Mebel</option>
                        <option value="Benzin">Benzin</option>
                        <option value="İri məişət">İri məişət</option>
                        <option value="Xırda məişət">Xırda məişət</option>
                        <option value="Aksesuar">Aksesuar</option>
                        <option value="Mobil telefon">Telefon</option>
                        <option value="Restoran">Restoran</option>
                        <option value="Əyləncə">Əyləncə</option>
                        <option value="CTC">CTC</option>
                        <option value="Nağdlaşma">Nağdlaşma</option>
                        <option value="Digər">Digər</option>
                    </select>
                </div>

                <select id="paymentMethod" onchange="toggleInstallmentMenu()" class="w-full p-3 rounded-xl bg-gray-700/50 border border-gray-600 outline-none text-white font-medium focus:border-indigo-500">
                    <option value="single">Birdəfəlik</option>
                    <option value="installment">Taksitlə</option>
                </select>

                <div id="installmentContainer" class="hidden-element">
                    <select id="installmentMonths" class="w-full p-3 rounded-xl bg-indigo-900/30 border border-indigo-500/30 outline-none text-white font-medium">
                        <option value="3">3 Ay</option>
                        <option value="6">6 Ay</option>
                        <option value="12">12 Ay</option>
                        <option value="18">18 Ay</option>
                        <option value="21">21 Ay</option>
                        <option value="24">24 Ay</option>
                    </select>
                </div>

                <button onclick="addExpense()" class="w-full bg-indigo-600 hover:bg-indigo-500 p-3 rounded-xl font-bold transition shadow-lg active:scale-95 uppercase text-xs tracking-widest text-white">Sistemə İşlə</button>
            </div>
        </div>

        <h2 class="text-xs font-bold mb-4 text-gray-500 uppercase tracking-[0.2em] text-left">Əməliyyat Tarixçəsi</h2>
        <div id="expenseList" class="space-y-4 pb-20 text-left"></div>
    </div>

    <script>
        const totalLimit = 12500;
        let expenses = JSON.parse(localStorage.getItem('myExpenses')) || [];
        document.getElementById('salaryDay').value = localStorage.getItem('mySalaryDay') || 1;

        function toggleInstallmentMenu() {
            const method = document.getElementById('paymentMethod').value;
            document.getElementById('installmentContainer').style.display = (method === 'installment') ? 'block' : 'none';
        }

        function saveSalaryDay() {
            localStorage.setItem('mySalaryDay', document.getElementById('salaryDay').value);
            updateUI();
        }

        function calculateFinance() {
            let totalSpentEver = 0;
            let currentInstallmentDebt = 0;
            let monthlyTotals = {};

            expenses.forEach(exp => {
                totalSpentEver += exp.finalAmount;
                if (exp.isInstallment) {
                    const monthlyAmount = exp.finalAmount / exp.months;
                    const remainingMonths = exp.months - exp.paidMonths;
                    currentInstallmentDebt += (monthlyAmount * remainingMonths);
                    for (let i = 1; i <= remainingMonths; i++) {
                        monthlyTotals[i] = (monthlyTotals[i] || 0) + monthlyAmount;
                    }
                }
            });

            const realBalance = totalLimit - totalSpentEver;
            const currentLimit = totalLimit - (expenses.reduce((acc, curr) => {
                return acc + (curr.isInstallment ? (curr.finalAmount / curr.months * (curr.months - curr.paidMonths)) : curr.finalAmount);
            }, 0));

            document.getElementById('realBalanceDisplay').innerText = `₼ ${realBalance.toFixed(2)}`;
            document.getElementById('remainingDisplay').innerText = `₼ ${currentLimit.toFixed(2)}`;
            document.getElementById('totalDebtLoad').innerText = `₼ ${currentInstallmentDebt.toFixed(2)}`;
            document.getElementById('nextMonthDisplay').innerText = `₼ ${(monthlyTotals[1] || 0).toFixed(2)}`;

            const calendarList = document.getElementById('calendarList');
            const monthsCount = Object.keys(monthlyTotals).length;
            document.getElementById('paymentCalendar').style.display = monthsCount > 0 ? 'block' : 'none';
            calendarList.innerHTML = '';
            for (let i = 1; i <= monthsCount; i++) {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-2 bg-gray-700/20 rounded-lg border border-white/5";
                div.innerHTML = `<span>${i}. Ay sonra</span> <span class="font-bold text-orange-300">₼ ${monthlyTotals[i].toFixed(2)}</span>`;
                calendarList.appendChild(div);
            }
        }

        function makePayment(index) {
            if (confirm(`${expenses[index].name} üçün ödənişi təsdiqləyirsiniz?`)) {
                expenses[index].paidMonths++;
                localStorage.setItem('myExpenses', JSON.stringify(expenses));
                updateUI();
            }
        }

        function updateUI() {
            const list = document.getElementById('expenseList');
            list.innerHTML = '';
            expenses.slice().reverse().forEach((exp, actualIdx) => {
                const index = expenses.length - 1 - actualIdx;
                const div = document.createElement('div');
                div.className = "expense-card bg-gray-800/50 p-4 rounded-2xl border border-gray-700 relative text-left";
                
                const monthlyPayment = (exp.finalAmount / exp.months).toFixed(2);
                const remainingDebt = (exp.finalAmount - (monthlyPayment * exp.paidMonths)).toFixed(2);
                const progressPercent = (exp.paidMonths / exp.months) * 100;

                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 text-left">
                                <p class="font-bold text-gray-200 text-sm">${exp.name}</p>
                                ${exp.fee > 0 ? `<span class="text-[8px] bg-red-900/30 text-red-400 px-1.5 py-0.5 rounded border border-red-800/30 uppercase tracking-tighter">Fee</span>` : ''}
                            </div>
                            <p class="text-[10px] text-gray-500 mt-0.5 italic">${exp.category} • ${exp.date}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-red-400 font-bold text-sm">-₼ ${exp.finalAmount.toFixed(2)}</p>
                            ${exp.isInstallment ? `<p class="text-[9px] text-orange-400 font-medium">₼ ${monthlyPayment}/ay</p>` : ''}
                        </div>
                    </div>
                    ${exp.isInstallment ? `
                        <div class="mt-3 pt-3 border-t border-gray-700/50">
                            <div class="flex justify-between text-[9px] mb-1 opacity-60 uppercase font-bold tracking-tighter">
                                <span>Ödənilib: ${exp.paidMonths}/${exp.months} AY</span>
                                <span>QALAN: ₼ ${Math.max(0, remainingDebt).toFixed(2)}</span>
                            </div>
                            <div class="w-full bg-gray-700 rounded-full h-1 mb-3">
                                <div class="bg-indigo-500 h-1 rounded-full progress-bar" style="width: ${progressPercent}%"></div>
                            </div>
                            ${exp.paidMonths < exp.months ? 
                                `<button onclick="makePayment(${index})" class="w-full py-1.5 bg-indigo-900/20 hover:bg-indigo-900/40 text-indigo-300 rounded-lg text-[9px] font-bold border border-indigo-500/20 transition uppercase tracking-wider">Ödənişi Qeyd Et</button>` : 
                                `<div class="text-center text-green-500 text-[9px] font-bold py-1 bg-green-900/10 rounded border border-green-800/20 uppercase tracking-widest">Ödənildi ✓</div>`}
                        </div>` : ''}
                `;
                list.appendChild(div);
            });
            calculateFinance();
        }

        function addExpense() {
            const nameEl = document.getElementById('itemName');
            const amountEl = document.getElementById('itemAmount');
            const categoryEl = document.getElementById('itemCategory');
            const methodEl = document.getElementById('paymentMethod');
            const monthsEl = document.getElementById('installmentMonths');

            if (!nameEl.value || isNaN(parseFloat(amountEl.value)) || !categoryEl.value) {
                alert("Zəhmət olmasa bütün məlumatları daxil edin!");
                return;
            }

            let amount = parseFloat(amountEl.value);
            let fee = (categoryEl.value === "CTC" || categoryEl.value === "Nağdlaşma") ? amount * 0.025 : 0;
            let finalAmount = amount + fee;

            expenses.push({
                name: nameEl.value,
                finalAmount: finalAmount,
                fee: fee,
                category: categoryEl.value,
                isInstallment: (methodEl.value === 'installment'),
                months: (methodEl.value === 'installment') ? parseInt(monthsEl.value) : 1,
                paidMonths: 0,
                date: new Date().toLocaleDateString('az-AZ')
            });

            localStorage.setItem('myExpenses', JSON.stringify(expenses));
            updateUI();
            nameEl.value = ''; amountEl.value = ''; categoryEl.selectedIndex = 0;
        }

        updateUI();
    </script>
</body>
</html>
